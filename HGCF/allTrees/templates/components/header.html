{% load static %}
<link href="{% static 'style/header.css' %}" rel="stylesheet"/>
{% if smallHeader %}
    <link href="{% static 'style/smallHeader.css' %}" rel="stylesheet" />
{% endif %}
<script defer src="{% static 'script/navBar.js' %}"></script>

<header id="header" class="site-header">
    <div class="header-inner">

        <div class="logo">
            <a href="{% url 'home' %}" aria-label="Heaven's Gates Cherry Farm Home">
                <img src="{% static 'images/HGCF-logo.png' %}" alt="Heaven's Gates Cherry Farm logo">
            </a>
        </div>

        <button 
            id="menu" 
            class="menu" 
            type="button" 
            aria-label="Open navigation menu"
            aria-expanded="false"
        >
            <span class="menu-text">Menu</span>
            <span class="menu-bars">
                <span></span>
                <span></span>
                <span></span>
            </span>
        </button>

        <nav id="mainNav" class="navCont" aria-label="Main navigation">
            <ul class="main-nav">
                <li class="wood-button-gap">
                    <a class="wood-button" href="{% url 'home' %}">Home</a>
                </li>

                <li class="wood-button-gap">
                    <a class="wood-button" href="{% url 'our_story' %}">Our Story</a>
                </li>

                <li class="wood-button-gap">
                    <a class="wood-button" href="{% url 'announcements' %}">Announcements</a>
                </li>

                {% comment %} <li class="wood-button-gap">
                    <a class="wood-button" href="#">What's Fresh</a>
                </li> {% endcomment %}

                <li class="wood-button-gap">
                    <a class="wood-button youtube-button" href="https://www.youtube.com/channel/UCEq7svzVL36E3hsai-jmF_g" target="_blank" rel="noopener">
                        <span class="youtube-play">▶</span>
                        YouTube
                    </a>
                </li>

                <li class="wood-button-gap">
                    <a class="wood-button" href="{% url 'store' %}">Store</a>
                </li>

                <li class="wood-button-gap">
                    <a class="wood-button" href="{% url 'upick_landing' %}">U-Pick</a>
                </li>

                <li class="wood-button-gap">
                    <a class="wood-button" href="{% url 'login' %}">TreeSpace</a>
                </li>
            </ul>
        </nav>

    </div>
</header>
