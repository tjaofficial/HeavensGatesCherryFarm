{% load static %}

<link href="{% static 'style/sideBar.css' %}" rel="stylesheet" />
<script src="https://unpkg.com/lucide@latest"></script>
<script defer src="{% static 'script/sideBar.js' %}"></script>

<button 
    type="button" 
    id="sideBarToggle" 
    class="sidebar-toggle"
    aria-label="Open TreeSpace sidebar"
    aria-expanded="false"
>
    <i data-lucide="menu"></i>
    <span>TreeSpace</span>
</button>

<div id="sideBarOverlay" class="sidebar-overlay"></div>

<aside id="treeSpaceSidebar" class="play treespace-sidebar">

    <div class="sidebar-brand">
        <div class="sidebar-brand-icon">
            <i data-lucide="trees"></i>
        </div>

        <div class="sidebar-brand-text">
            <span>TreeSpace</span>
            <small>Farm Admin</small>
        </div>
    </div>

    <nav class="sidebar-nav">

        <div class="sidebar-section">
            <div class="sidebar-section-title">Trees</div>

            <a href="{% url 'farm_map' %}" class="sidebar-link">
                <i data-lucide="map"></i>
                <span>Farm Map</span>
            </a>

            <a href="{% url 'irrigation_dashboard' %}" class="sidebar-link">
                <i data-lucide="droplets"></i>
                <span>Irrigation</span>
            </a>

            <a href="{% url 'weatherDash' %}" class="sidebar-link">
                <i data-lucide="cloud-sun"></i>
                <span>Weather</span>
            </a>
        </div>


        <div class="sidebar-section">
            <div class="sidebar-section-title">Farm Ops</div>

            <a href="{% url 'treespace_upick_dashboard' %}" class="sidebar-link">
                <i data-lucide="calendar-check"></i>
                <span>U-Pick</span>
            </a>

            <a href="{% url 'treespace_upick_waitlist' %}" class="sidebar-link">
                <i data-lucide="clipboard-list"></i>
                U-Pick Waiting List
            </a>

            <a href="{% url 'treespace_announcement_setup' %}" class="sidebar-link">
                <i data-lucide="megaphone"></i>
                <span>News</span>
            </a>

            <a href="{% url 'treespace_email_update' %}" class="sidebar-link">
                <i data-lucide="send"></i>
                <span>Email Updates</span>
            </a>
        </div>


        <div class="sidebar-section">
            <div class="sidebar-section-title">Store</div>

            <a href="{% url 'pos_terminal_page' %}" class="sidebar-link">
                <i data-lucide="monitor-dot"></i>
                <span>POS</span>
            </a>

            <a href="{% url 'pos_sales_list_page' %}" class="sidebar-link">
                <i data-lucide="receipt-text"></i>
                <span>Sales</span>
            </a>

            <a href="{% url 'treespace_store_orders' %}" class="sidebar-link">
                <i data-lucide="package-check"></i>
                <span>Store Orders</span>
            </a>

            <a href="{% url 'pos_products_list_page' %}" class="sidebar-link">
                <i data-lucide="package"></i>
                <span>Products</span>
            </a>

            <a href="{% url 'addProduct' %}" class="sidebar-link">
                <i data-lucide="package-plus"></i>
                <span>Add Item</span>
            </a>
        </div>


        <div class="sidebar-section">
            <div class="sidebar-section-title">Other</div>

            <a href="{% url 'recipeForm' %}" class="sidebar-link">
                <i data-lucide="utensils"></i>
                <span>Recipes</span>
            </a>

            <div class="sidebar-link disabled-link">
                <i data-lucide="play-circle"></i>
                <span>YouTube</span>
            </div>
        </div>

    </nav>

    <div class="sidebar-footer">
        <a href="{% url 'Logout' %}" class="sidebar-link logout-link">
            <i data-lucide="log-out"></i>
            <span>Logout</span>
        </a>
    </div>

</aside>
